---
# tasks file for enginx
- name: Update apt cache "sudo apt  update"
  apt:
    update_cache: yes

- name: Install nginx
  apt:
    name: 
      - nginx
      - rsync
    state: present
    update_cache: yes

- name: Start nginx
  service:
    name: nginx
    state: started
    enabled: true
  
- name: Copy nginx config
  template:
    src: portfolio.conf.j2
    dest: /etc/nginx/sites-available/portfolio
    
- name: Enable site
  file:
    src: /etc/nginx/sites-available/portfolio
    dest: /etc/nginx/sites-enabled/portfolio
    state: link  

- name: Disable default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart Nginx